services:
  db:
    image: mongo:6
    container_name: wekan_db
    restart: unless-stopped
    networks:
      - jobsearch-tools
    volumes:
      - wekan-db:/data/db
    expose:
      - 27017

  wekan:
    image: wekanteam/wekan:latest
    container_name: wekan_app
    restart: unless-stopped
    networks:
      - jobsearch-tools
    ports:
      - "9999:8080"
    environment:
      - MONGO_URL=mongodb://db:27017/wekan
      - ROOT_URL=http://192.168.1.146:9999
    depends_on:
      - db

networks:
  jobsearch-tools:
    external: true

volumes:
  wekan-db:
    driver: local
